</head>

<body>

<div class="sidebar">

<h2><i class="fa-solid fa-graduation-cap"></i> InternHub</h2>

<a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>

    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</a>
</div>

<div class="readiness-container">

<h1>
<i class="fa-solid fa-magnifying-glass-chart"></i>
Failure Analyzer
</h1>

<div class="internship-card">

<h3>Possible Reasons for Rejection</h3>

<div id="analysis"></div>

</div>

</div>

<script>

const studentId = Number(localStorage.getItem("studentId"));
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
async function analyzeFailure(){

    try{

        // Load student
        const studentResponse =
        await fetch("https://internhub-production-dd96.up.railway.app/student/" + studentId);

        const student = await studentResponse.json();

        // Load all applications
        const applicationResponse =
        await fetch("https://internhub-production-dd96.up.railway.app/application/all");

        const applications =
        await applicationResponse.json();

        // Student applications
        const myApplications =
        applications.filter(app => app.studentId == studentId);

        let output = "";

        // ========= PROFILE CHECK =========

        if(!student.skills || student.skills.trim()==""){

            output += "<p>❌ Add technical skills like Java, Spring Boot, MySQL, HTML and CSS.</p>";

        }

        if(!student.githubLink || student.githubLink.trim()==""){

            output += "<p>❌ Upload your GitHub profile with at least 3 projects.</p>";

        }

        if(!student.linkedinLink || student.linkedinLink.trim()==""){

            output += "<p>❌ Add your LinkedIn profile.</p>";

        }

        if(!student.resume || student.resume.trim()==""){

            output += "<p>❌ Resume not uploaded.</p>";

        }

        // ========= APPLICATION CHECK =========

        if(myApplications.length==0){

            output += "<p>⚠ You have not applied for any internship yet.</p>";

        }

        const rejected =
        myApplications.filter(a=>a.status==="Rejected").length;

        const pending =
        myApplications.filter(a=>a.status==="Pending").length;

        const selected =
        myApplications.filter(a=>a.status==="Selected").length;

        if(rejected>0){

            output += `<p>❌ You have ${rejected} rejected application(s). Improve your skills and resume before applying again.</p>`;

        }

        if(pending>0){

            output += `<p>🟡 ${pending} application(s) are still under review. Keep preparing for interviews.</p>`;

        }

        if(selected>0){

            output += `<p style="color:green;">🎉 Congratulations! You have been selected for ${selected} internship(s).</p>`;

        }

        // ========= FINAL MESSAGE =========

        if(output==""){

            output = `
            <h2 style="color:green;">
            ✅ Excellent! Your profile looks complete.
            </h2>

            <p>
            🚀 Keep applying for internships and continue improving your projects.
            </p>
            `;

        }

        document.getElementById("analysis").innerHTML=output;

    }

    catch(error){

        console.log(error);

        document.getElementById("analysis").innerHTML=
        "<p>❌ Unable to analyze your profile.</p>";

    }

}

analyzeFailure();

</script>

</body>

</html>
