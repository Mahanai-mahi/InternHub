<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InternHub Login</title>

    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>InternHub</h1>

        <p>Welcome Back</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

        <div class="link">

            <a href="register.html">

                New User? Create Account

            </a>

        </div>

    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function (e) {

    e.preventDefault();

    const student = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try {

        const response = await fetch("https://internhub-production-dd96.up.railway.app/student/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(student)
        });

        console.log("Status:", response.status);

        const text = await response.text();
        console.log("Response Body:", text);

        if (response.ok) {

            if (!text || text.trim() === "") {
                alert("Server returned an empty response!");
                return;
            }

            const data = JSON.parse(text);

            localStorage.setItem("studentId", data.id);
            localStorage.setItem("studentName", data.name);
            localStorage.setItem("studentEmail", data.email);

            alert("Login Successful!");

            window.location.href = "dashboard.html";

        } else {

            alert("Login Failed!\n\nServer Response:\n" + text);

        }

    } catch (error) {

        console.error(error);
        alert("Server Error!\n\n" + error.message);

    }

});
</script>

</body>

</html>
