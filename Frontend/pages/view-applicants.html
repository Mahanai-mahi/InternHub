<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Applicants</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<body>

<div class="sidebar">

    <h2>
        <i class="fa-solid fa-building"></i>
        InternHub
    </h2>

    <a href="company-dashboard.html">Dashboard</a>

    <a href="post-internship.html">Post Internship</a>

    <a href="manage-internships.html">Manage Internships</a>

    <a href="view-applicants.html">View Applicants</a>

    <a href="company-login.html">Logout</a>

</div>

<div class="internships-container">

    <h1>View Applicants</h1>

    <div id="loading" class="loading-box">
    <div class="loader"></div>
    <p>Loading Applicants...</p>
</div>

<div id="applicantList"></div>

</div>

<script>

async function loadApplicants(){

    const response = await fetch("https://internhub-production-dd96.up.railway.app/application/all");
    const applications = await response.json();

    const studentResponse = await fetch("https://internhub-production-dd96.up.railway.app/student/all");
    const students = await studentResponse.json();

    const internshipResponse = await fetch("https://internhub-production-dd96.up.railway.app/api/internships");
    const internships = await internshipResponse.json();

    let output = "";

    if(applications.length === 0){

        output = "<h2>No Applications Found.</h2>";

    }else{

        for(const application of applications){

            const student = students.find(
                s => s.id === application.studentId
            );

            const internship = internships.find(
                i => i.internshipId === application.internshipId
            );

            output += `

            <div class="internship-card">

                <h2>${internship ? internship.title : "Internship Not Found"}</h2>

                <p><b>Student :</b> ${student ? student.name : "Unknown"}</p>

                <p><b>Email :</b> ${student ? student.email : "-"}</p>

                <p><b>Branch :</b> ${student ? student.branch : "-"}</p>

                <p><b>Status :</b> ${application.status}</p>

                <button class="select-btn"
                onclick="updateStatus(${application.id},'Selected')">

                ✅ Select

                </button>

                <button class="reject-btn"
                onclick="updateStatus(${application.id},'Rejected')">

                ❌ Reject

                </button>

            </div>

            `;

        }

    }

    document.getElementById("applicantList").innerHTML = output;
    document.getElementById("loading").style.display = "none";
}

async function updateStatus(id,status){

    const response = await fetch(

        "https://internhub-production-dd96.up.railway.app/application/status/" + id + "?status=" + status,

        {
            method:"PUT"
        }

    );

    if(response.ok){

        alert("Status Updated Successfully!");

        loadApplicants();

    }else{

        alert("Update Failed!");

    }

}

loadApplicants();

</script>

</body>
</html>
